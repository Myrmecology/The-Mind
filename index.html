<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE MIND</title>
    <link rel="stylesheet" href="css/style.css" />

    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>
  </head>
  <body>

    <!-- ═══════════════════════════════════════════════════
         NAME ENTRY SCREEN
    ════════════════════════════════════════════════════ -->
    <div id="name-screen">
      <div id="name-screen-inner">
        <svg id="name-svg-top" viewBox="0 0 500 30" xmlns="http://www.w3.org/2000/svg">
          <path id="name-squiggle-top" d="" fill="none" stroke-width="1.5"/>
        </svg>

        <div id="name-title">THE MIND</div>
        <div id="name-subtitle">IT WANTS TO KNOW YOUR NAME</div>

        <div id="name-input-wrap">
          <svg id="name-input-svg" viewBox="0 0 320 20" xmlns="http://www.w3.org/2000/svg">
            <path id="name-input-squiggle-top" d="" fill="none" stroke-width="1"/>
            <path id="name-input-squiggle-bot" d="" fill="none" stroke-width="1"/>
          </svg>
          <input
            id="name-input"
            type="text"
            maxlength="20"
            placeholder="ENTER YOUR NAME"
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <button id="name-enter-btn">ENTER THE MIND</button>

        <svg id="name-svg-bot" viewBox="0 0 500 30" xmlns="http://www.w3.org/2000/svg">
          <path id="name-squiggle-bot" d="" fill="none" stroke-width="1.5"/>
        </svg>

        <div id="name-warning">PROLONGED EXPOSURE IS NOT RECOMMENDED</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════
         CUSTOM DRAGON CURSOR
    ════════════════════════════════════════════════════ -->
    <canvas id="cursorCanvas"></canvas>

    <!-- ═══════════════════════════════════════════════════
         MAIN BABYLON CANVAS
    ════════════════════════════════════════════════════ -->
    <canvas id="renderCanvas"></canvas>

    <!-- ═══════════════════════════════════════════════════
         UI OVERLAY
    ════════════════════════════════════════════════════ -->
    <div id="ui-overlay">

      <!-- Title -->
      <div id="title-block">
        <svg id="title-svg" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
          <path id="title-squiggle-top" d="" fill="none" stroke-width="1.5"/>
          <path id="title-squiggle-bot" d="" fill="none" stroke-width="1.5"/>
          <text id="title-text" x="200" y="52" text-anchor="middle">THE MIND</text>
        </svg>
      </div>

      <!-- Sanity Meter -->
      <div id="sanity-block">
        <div id="sanity-label">SANITY</div>
        <svg id="sanity-svg" viewBox="0 0 220 40" xmlns="http://www.w3.org/2000/svg">
          <path id="sanity-track"   d="" fill="none" stroke="#2a0a2a" stroke-width="6"/>
          <path id="sanity-fill"    d="" fill="none" stroke-width="6"/>
          <path id="sanity-squiggle" d="" fill="none" stroke-width="1"/>
        </svg>
      </div>

      <!-- Timer -->
      <div id="timer-block">
        <svg id="timer-svg" viewBox="0 0 180 36" xmlns="http://www.w3.org/2000/svg">
          <path id="timer-squiggle" d="" fill="none" stroke-width="1"/>
          <text id="timer-text" x="90" y="24" text-anchor="middle">00:00</text>
        </svg>
      </div>

      <!-- Chaos Slider -->
      <div id="chaos-block">
        <div id="chaos-label">CHAOS</div>
        <svg id="chaos-svg" viewBox="0 0 220 16" xmlns="http://www.w3.org/2000/svg">
          <path id="chaos-squiggle" d="" fill="none" stroke-width="1"/>
        </svg>
        <input id="chaos-slider" type="range" min="0" max="100" value="0" />
      </div>

      <!-- Secret Code Display -->
      <div id="secret-code-display"></div>

      <!-- Constellation Mode Hint -->
      <div id="constellation-hint">[ C ] CONSTELLATION</div>

      <!-- Whisper Text -->
      <div id="whisper-text"></div>

      <!-- Mind Break Overlay -->
      <div id="mind-break-overlay">
        <svg id="break-svg" viewBox="0 0 600 260" xmlns="http://www.w3.org/2000/svg">
          <path id="break-squiggle-a" d="" fill="none" stroke-width="2"/>
          <path id="break-squiggle-b" d="" fill="none" stroke-width="2"/>
          <text id="break-text" x="300" y="100" text-anchor="middle">MIND BREAK</text>
          <text id="break-subtext" x="300" y="148" text-anchor="middle">YOUR MIND HAS SHATTERED</text>
        </svg>
        <button id="reset-btn">REBUILD THE MIND</button>
      </div>

    </div><!-- /ui-overlay -->

    <script src="js/main.js"></script>
  </body>
</html>
